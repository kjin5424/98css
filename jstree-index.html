<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>jsTree</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/98.css" />
    <link rel="stylesheet" href="assets/styles/learn.css" />
  </head>
  <body class="is-page">
    <div id="app">

      <div class="sidebar">
        <div class="sidebar-title">🌳 jsTree</div>
        <ol class="topic-list">
          <li class="topic-item active" data-id="1">기본 설정</li>
          <li class="topic-item" data-id="2">JSON 데이터</li>
          <li class="topic-item" data-id="3">이벤트 처리</li>
          <li class="topic-item" data-id="4">API 메서드</li>
        </ol>
      </div>

      <div class="main-area">
        <div class="tabs">
          <button class="tab-btn active" data-tab="explain">📖 설명</button>
          <button class="tab-btn" data-tab="practice">⌨️ 실습</button>
        </div>
        <div class="tab-pane active" id="explain-pane">
          <div class="content-body" id="explain-body"></div>
        </div>
        <div class="tab-pane" id="practice-pane">
          <div class="practice-area">
            <div class="editor-label">📝 코드 에디터 (jsTree 라이브러리 사용 가능)</div>
            <textarea class="code-editor" id="code-editor" spellcheck="false"></textarea>
            <div class="btn-row">
              <button id="btn-run">▶ 실행</button>
              <button id="btn-reset">↺ 초기화</button>
              <button id="btn-clear">🗑 지우기</button>
              <span class="hint-text">jQuery + jsTree 3.3이 자동 로드됩니다</span>
            </div>
            <div class="output-wrap">
              <div class="output-label">실행 결과</div>
              <iframe class="output-frame" id="output-frame" sandbox="allow-scripts allow-same-origin"></iframe>
            </div>
          </div>
        </div>
      </div>

    </div>
    <script>
      const COMMON_HEAD =
        '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.16/themes/default/style.min.css" />' +
        '<script src="https://code.jquery.com/jquery-3.7.1.min.js"><\/script>' +
        '<script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.16/jstree.min.js"><\/script>' +
        '<style>body{font-family:Arial,sans-serif;font-size:12px;margin:8px;}' +
        '.log{border-bottom:1px solid #eee;padding:2px 4px;font-family:monospace;font-size:11px;}' +
        '.err{padding:3px 6px;background:#fee;color:red;font-family:monospace;font-size:11px;border-left:3px solid red;margin:2px 0;}' +
        'button{padding:3px 8px;margin:2px;cursor:pointer;font-size:11px;}' +
        '#info{margin-top:6px;padding:4px 8px;background:#f0f8ff;border:1px solid #99c;font-size:11px;min-height:20px;}</style>';

      const TOPICS = [
        {
          id: 1,
          label: '기본 설정',
          content: '<h3>jsTree란?</h3>' +
            '<p>jQuery 기반의 트리 UI 플러그인입니다. 파일 탐색기, 카테고리, 조직도 등에 활용됩니다.</p>' +
            '<h3>CDN 로드</h3>' +
            '<pre class="code">&lt;link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.16/themes/default/style.min.css" /&gt;\n&lt;script src="https://code.jquery.com/jquery-3.7.1.min.js"&gt;&lt;/script&gt;\n&lt;script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.16/jstree.min.js"&gt;&lt;/script&gt;</pre>' +
            '<h3>HTML 구조로 초기화</h3>' +
            '<pre class="code">&lt;!-- HTML --&gt;\n&lt;div id="tree"&gt;\n  &lt;ul&gt;\n    &lt;li&gt;루트\n      &lt;ul&gt;\n        &lt;li&gt;자식 1&lt;/li&gt;\n        &lt;li&gt;자식 2&lt;/li&gt;\n      &lt;/ul&gt;\n    &lt;/li&gt;\n  &lt;/ul&gt;\n&lt;/div&gt;\n\n// 기본 초기화\n$(\'#tree\').jstree();\n\n// 옵션과 함께\n$(\'#tree\').jstree({\n  core: {\n    themes: { variant: \'small\' },\n    multiple:       true,  // 다중 선택\n    check_callback: true   // 노드 수정 허용\n  },\n  plugins: [\'checkbox\', \'search\', \'dnd\', \'contextmenu\']\n});</pre>' +
            '<h3>주요 플러그인</h3>' +
            '<table class="ref">' +
            '<tr><th>플러그인</th><th>기능</th></tr>' +
            '<tr><td>checkbox</td><td>체크박스 표시</td></tr>' +
            '<tr><td>search</td><td>노드 검색</td></tr>' +
            '<tr><td>dnd</td><td>드래그 앤 드롭 이동</td></tr>' +
            '<tr><td>contextmenu</td><td>우클릭 메뉴</td></tr>' +
            '<tr><td>sort</td><td>알파벳 자동 정렬</td></tr>' +
            '<tr><td>types</td><td>노드 타입 정의</td></tr>' +
            '</table>',
          code: '$(function() {\n  // HTML 구조로 jsTree 초기화\n  $("#tree").jstree({\n    core: {\n      check_callback: true,\n      themes: { dots: true, icons: true }\n    },\n    plugins: ["checkbox"]\n  });\n\n  // 선택 이벤트\n  $("#tree").on("select_node.jstree", function(e, data) {\n    $("#info").text("선택: " + data.node.text + " (ID: " + data.node.id + ")");\n  });\n\n  // 버튼\n  $("#btn-expand").click(() => $("#tree").jstree("open_all"));\n  $("#btn-collapse").click(() => $("#tree").jstree("close_all"));\n});',
          body: '<div>' +
            '<div style="margin-bottom:6px;">' +
            '<button id="btn-expand">모두 펼치기</button>' +
            '<button id="btn-collapse">모두 접기</button>' +
            '</div>' +
            '<div id="tree">' +
            '<ul><li id="cat1">카테고리 A' +
            '<ul><li>항목 A-1</li><li>항목 A-2</li><li>항목 A-3</li></ul></li>' +
            '<li id="cat2">카테고리 B' +
            '<ul><li>항목 B-1</li><li>항목 B-2</li></ul></li>' +
            '<li id="cat3">카테고리 C' +
            '<ul><li>항목 C-1</li></ul></li></ul>' +
            '</div>' +
            '<div id="info">노드를 클릭하세요.</div></div>'
        },
        {
          id: 2,
          label: 'JSON 데이터',
          content: '<h3>JSON으로 트리 초기화</h3>' +
            '<pre class="code">$(\'#tree\').jstree({\n  core: {\n    data: [\n      {\n        id:   "1",\n        text: "루트 노드",\n        icon: "jstree-folder",\n        state: { opened: true },\n        children: [\n          { id: "1-1", text: "자식 1", icon: "jstree-file" },\n          { id: "1-2", text: "자식 2",\n            children: [\n              { id: "1-2-1", text: "손자" }\n            ]\n          }\n        ]\n      }\n    ]\n  }\n});</pre>' +
            '<h3>Ajax로 데이터 로드</h3>' +
            '<pre class="code">$(\'#tree\').jstree({\n  core: {\n    data: {\n      url:      "/api/tree",\n      dataType: "json",\n      // 노드 펼칠 때마다 자식 데이터 로드\n      data: function(node) {\n        return { id: node.id };\n      }\n    }\n  }\n});\n\n// 서버에서 반환할 JSON 형식\n[\n  { "id": "1", "text": "노드1", "children": true },\n  { "id": "2", "text": "노드2", "children": false }\n]</pre>' +
            '<h3>노드 state 옵션</h3>' +
            '<pre class="code">{\n  id:    "node1",\n  text:  "노드 텍스트",\n  icon:  "jstree-folder",  // 아이콘 클래스 또는 이미지 URL\n  state: {\n    opened:   true,   // 펼쳐진 상태\n    selected: false,  // 선택된 상태\n    disabled: false,  // 비활성화\n    checked:  true    // checkbox 체크 (checkbox 플러그인)\n  },\n  a_attr: { href: "/page/1" }, // &lt;a&gt; 태그 속성\n  li_attr: { class: "custom" } // &lt;li&gt; 태그 속성\n}</pre>',
          code: '$(function() {\n  const treeData = [\n    {\n      id: "lang", text: "📁 프로그래밍 언어",\n      state: { opened: true },\n      children: [\n        { id: "java",   text: "☕ Java",       icon: "jstree-file" },\n        { id: "js",     text: "📜 JavaScript", icon: "jstree-file" },\n        { id: "python", text: "🐍 Python",     icon: "jstree-file" }\n      ]\n    },\n    {\n      id: "fw", text: "📁 프레임워크",\n      state: { opened: true },\n      children: [\n        { id: "spring", text: "🌿 Spring",  icon: "jstree-file" },\n        { id: "jquery", text: "💠 jQuery",  icon: "jstree-file" },\n        { id: "react",  text: "⚛️ React",   icon: "jstree-file" }\n      ]\n    },\n    {\n      id: "db", text: "📁 데이터베이스",\n      children: [\n        { id: "mysql",  text: "🐬 MySQL",  icon: "jstree-file" },\n        { id: "oracle", text: "🔷 Oracle", icon: "jstree-file" }\n      ]\n    }\n  ];\n\n  $("#tree").jstree({\n    core: { data: treeData, check_callback: true },\n    plugins: ["checkbox"]\n  });\n\n  $("#tree").on("select_node.jstree", function(e, data) {\n    $("#info").text("선택: " + data.node.text + " (ID: " + data.node.id + ")");\n  });\n\n  $("#btn-expand").click(() => $("#tree").jstree("open_all"));\n  $("#btn-collapse").click(() => $("#tree").jstree("close_all"));\n  $("#btn-checked").click(function() {\n    const ids = $("#tree").jstree("get_checked");\n    $("#info").text("체크된 노드: " + (ids.length ? ids.join(", ") : "없음"));\n  });\n});',
          body: '<div>' +
            '<div style="margin-bottom:6px;">' +
            '<button id="btn-expand">모두 펼치기</button>' +
            '<button id="btn-collapse">모두 접기</button>' +
            '<button id="btn-checked">체크 확인</button>' +
            '</div>' +
            '<div id="tree"></div>' +
            '<div id="info">노드를 클릭하세요.</div></div>'
        },
        {
          id: 3,
          label: '이벤트 처리',
          content: '<h3>주요 이벤트</h3>' +
            '<pre class="code">// 노드 선택\n$(\'#tree\').on(\'select_node.jstree\', function(e, data) {\n  console.log(\'선택된 노드 ID:\', data.node.id);\n  console.log(\'텍스트:\', data.node.text);\n  console.log(\'선택된 모든 ID:\', data.selected);\n});\n\n// 노드 펼침/접힘\n$(\'#tree\').on(\'open_node.jstree\',  (e, d) => console.log(\'열림:\', d.node.text));\n$(\'#tree\').on(\'close_node.jstree\', (e, d) => console.log(\'닫힘:\', d.node.text));\n\n// 체크박스 (checkbox 플러그인)\n$(\'#tree\').on(\'check_node.jstree\', function(e, data) {\n  const checked = $(this).jstree(\'get_checked\');\n  console.log(\'체크된 노드:\', checked);\n});\n$(\'#tree\').on(\'uncheck_node.jstree\', (e, data) => { ... });\n\n// 노드 이동 (dnd 플러그인)\n$(\'#tree\').on(\'move_node.jstree\', function(e, data) {\n  console.log(\'이동:\', data.node.id, \'→ 부모:\', data.parent);\n});\n\n// 노드 생성/이름변경/삭제\n$(\'#tree\').on(\'create_node.jstree\', (e, d) => console.log(\'생성:\', d.node));\n$(\'#tree\').on(\'rename_node.jstree\', (e, d) => console.log(\'변경:\', d.old, \'→\', d.text));\n$(\'#tree\').on(\'delete_node.jstree\', (e, d) => console.log(\'삭제:\', d.node.text));</pre>',
          code: '$(function() {\n  $("#tree").jstree({\n    core: {\n      check_callback: true,\n      data: [\n        { id: "a", text: "📁 폴더 A", state: { opened: true },\n          children: [\n            { id: "a1", text: "파일 1", icon: "jstree-file" },\n            { id: "a2", text: "파일 2", icon: "jstree-file" }\n          ]\n        },\n        { id: "b", text: "📁 폴더 B",\n          children: [\n            { id: "b1", text: "파일 3", icon: "jstree-file" }\n          ]\n        }\n      ]\n    },\n    plugins: ["checkbox", "dnd"]\n  });\n\n  // 이벤트 로깅\n  $("#tree")\n    .on("select_node.jstree", function(e, data) {\n      log("선택: " + data.node.text);\n    })\n    .on("open_node.jstree", function(e, data) {\n      log("열림: " + data.node.text);\n    })\n    .on("close_node.jstree", function(e, data) {\n      log("닫힘: " + data.node.text);\n    })\n    .on("move_node.jstree", function(e, data) {\n      log("이동: " + data.node.text + " → 부모: " + data.parent);\n    })\n    .on("check_node.jstree uncheck_node.jstree", function(e, data) {\n      const checked = $("#tree").jstree("get_checked");\n      log(e.type.split(".")[0] + " — 체크 수: " + checked.length);\n    });\n\n  function log(msg) {\n    const d = document.createElement("div");\n    d.className = "log";\n    d.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;\n    document.getElementById("event-log").prepend(d);\n  }\n});',
          body: '<div>' +
            '<div id="tree" style="float:left;width:45%;"></div>' +
            '<div style="float:left;width:50%;margin-left:5%;">' +
            '<b style="font-size:11px;">이벤트 로그:</b>' +
            '<div id="event-log" style="border:1px solid #ccc;height:200px;overflow-y:auto;background:#fff;"></div>' +
            '</div>' +
            '<div style="clear:both;"></div>' +
            '</div>'
        },
        {
          id: 4,
          label: 'API 메서드',
          content: '<h3>인스턴스 가져오기</h3>' +
            '<pre class="code">// 방법 1: true 전달\nconst tree = $(\'#tree\').jstree(true);\n\n// 방법 2: 메서드 직접 호출\n$(\'#tree\').jstree(\'open_all\');\n$(\'#tree\').jstree(\'get_selected\');</pre>' +
            '<h3>탐색 / 선택</h3>' +
            '<pre class="code">tree.open_node(\'node_id\');      // 노드 펼치기\ntree.close_node(\'node_id\');     // 노드 접기\ntree.open_all();                // 모두 펼치기\ntree.close_all();               // 모두 접기\n\ntree.select_node(\'node_id\');    // 노드 선택\ntree.deselect_node(\'node_id\');  // 선택 해제\ntree.deselect_all();            // 전체 해제\ntree.get_selected();            // 선택된 ID 배열\ntree.get_selected(true);        // 선택된 노드 객체 배열\n\ntree.get_node(\'node_id\');       // 노드 데이터 객체\ntree.get_checked();             // 체크된 ID 배열</pre>' +
            '<h3>CRUD</h3>' +
            '<pre class="code">// 노드 추가\ntree.create_node(\'parent_id\',\n  { text: \'새 노드\', icon: \'jstree-file\' },\n  \'last\'  // 위치: first/last/before/after/숫자\n);\n\n// 이름 변경\ntree.rename_node(\'node_id\', \'새 이름\');\n\n// 삭제\ntree.delete_node(\'node_id\');\ntree.delete_node([\'id1\', \'id2\']);\n\n// 이동\ntree.move_node(\'node_id\', \'new_parent_id\', \'last\');\ntree.copy_node(\'node_id\', \'new_parent_id\', \'last\');  // 복사\n\n// 리프레시\ntree.refresh();</pre>',
          code: '$(function() {\n  $("#tree").jstree({\n    core: {\n      check_callback: true,\n      data: [\n        { id: "root", text: "📁 루트", state: { opened: true },\n          children: [\n            { id: "n1", text: "항목 1", icon: "jstree-file" },\n            { id: "n2", text: "항목 2", icon: "jstree-file" }\n          ]\n        }\n      ]\n    }\n  });\n\n  let nodeCounter = 3;\n\n  // 노드 추가\n  $("#btn-add").click(function() {\n    const selected = $("#tree").jstree("get_selected");\n    const parent = selected.length ? selected[0] : "root";\n    const id = "n" + (nodeCounter++);\n    $("#tree").jstree("create_node", parent,\n      { id: id, text: "새 항목 " + nodeCounter, icon: "jstree-file" },\n      "last"\n    );\n  });\n\n  // 선택 노드 이름변경\n  $("#btn-rename").click(function() {\n    const sel = $("#tree").jstree("get_selected");\n    if (!sel.length) { $("#info").text("노드를 선택하세요."); return; }\n    const newName = prompt("새 이름:");\n    if (newName) $("#tree").jstree("rename_node", sel[0], newName);\n  });\n\n  // 선택 노드 삭제\n  $("#btn-delete").click(function() {\n    const sel = $("#tree").jstree("get_selected");\n    if (!sel.length) { $("#info").text("노드를 선택하세요."); return; }\n    $("#tree").jstree("delete_node", sel);\n  });\n\n  // 모두 펼치기/접기\n  $("#btn-expand").click(() => $("#tree").jstree("open_all"));\n  $("#btn-collapse").click(() => $("#tree").jstree("close_all"));\n\n  $("#tree").on("select_node.jstree", function(e, data) {\n    const node = data.node;\n    $("#info").text(\n      "선택: " + node.text + " | 부모: " + node.parent +\n      " | 자식 수: " + node.children.length\n    );\n  });\n});',
          body: '<div>' +
            '<div style="margin-bottom:6px;display:flex;flex-wrap:wrap;gap:2px;">' +
            '<button id="btn-add">➕ 추가</button>' +
            '<button id="btn-rename">✏️ 이름변경</button>' +
            '<button id="btn-delete">🗑 삭제</button>' +
            '<button id="btn-expand">모두 열기</button>' +
            '<button id="btn-collapse">모두 닫기</button>' +
            '</div>' +
            '<div id="tree"></div>' +
            '<div id="info" style="margin-top:6px;padding:4px 8px;background:#f0f8ff;border:1px solid #99c;font-size:11px;">노드를 클릭하세요.</div>' +
            '</div>'
        }
      ];

      let currentId = 1;

      function loadTopic(id) {
        const t = TOPICS.find(x => x.id === id);
        if (!t) return;
        currentId = id;
        document.getElementById('explain-body').innerHTML = t.content;
        document.getElementById('code-editor').value = t.code;
      }

      function buildSrcdoc(code) {
        const t = TOPICS.find(x => x.id === currentId);
        return '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
          COMMON_HEAD +
          '</head><body>' + (t.body || '') +
          '<script>(function(){' +
          'var _l=console.log;' +
          'console.log=function(){_l.apply(console,arguments);' +
          'var d=document.createElement("div");d.className="log";' +
          'd.textContent=Array.from(arguments).map(function(a){return typeof a==="object"?JSON.stringify(a):String(a);}).join(" ");' +
          'document.body.appendChild(d);};' +
          'window.onerror=function(m,s,l){var d=document.createElement("div");d.className="err";d.textContent="오류: "+m+" (line "+l+")";document.body.appendChild(d);return true;};' +
          '})();<\/script>' +
          '<script>try{' + code + '}catch(e){var d=document.createElement("div");d.className="err";d.textContent="런타임 오류: "+e.message;document.body.appendChild(d);}<\/script>' +
          '</body></html>';
      }

      loadTopic(1);

      document.querySelectorAll('.topic-item').forEach(li => {
        li.addEventListener('click', () => {
          document.querySelectorAll('.topic-item').forEach(x => x.classList.remove('active'));
          li.classList.add('active');
          loadTopic(parseInt(li.dataset.id));
        });
      });

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.tab + '-pane').classList.add('active');
        });
      });

      document.getElementById('btn-run').addEventListener('click', () => {
        document.getElementById('output-frame').srcdoc =
          buildSrcdoc(document.getElementById('code-editor').value);
      });
      document.getElementById('btn-reset').addEventListener('click', () => {
        document.getElementById('code-editor').value =
          TOPICS.find(x => x.id === currentId).code;
      });
      document.getElementById('btn-clear').addEventListener('click', () => {
        document.getElementById('output-frame').srcdoc = '';
      });

      document.getElementById('code-editor').addEventListener('keydown', e => {
        if (e.key === 'Tab') {
          e.preventDefault();
          const ta = e.target, s = ta.selectionStart;
          ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(ta.selectionEnd);
          ta.selectionStart = ta.selectionEnd = s + 2;
        }
      });
    </script>
  </body>
</html>
